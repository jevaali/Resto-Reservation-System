<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Test</title>
</head>
<body>
    <h1>Module Loading Test</h1>
    <div id="output"></div>
    
    <script type="module">
        console.log('Main module loaded');
        try {
            import('/js/api/adminApi.js').then(module => {
                console.log('adminApi module imported successfully');
                document.getElementById('output').textContent = 'adminApi module loaded successfully!';
            }).catch(error => {
                console.error('Error importing adminApi module:', error);
                document.getElementById('output').textContent = 'Error loading adminApi module: ' + error.message;
            });
            
            import('/js/services/adminDashboard.js').then(module => {
                console.log('adminDashboard module imported successfully');
            }).catch(error => {
                console.error('Error importing adminDashboard module:', error);
            });
        } catch (error) {
            console.error('General error:', error);
            document.getElementById('output').textContent = 'Error: ' + error.message;
        }
    </script>
</body>
</html>
