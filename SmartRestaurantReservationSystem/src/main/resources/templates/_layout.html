<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
  <meta charset="UTF-8">
  <title th:text="${pageTitle}">Restaurant Reservation System</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<header class="navbar">
  <div class="logo">ReservationSystem</div>
  <nav>
    <a href="/" th:href="@{/}">Home</a>
    <a href="/privacy" th:href="@{/privacy}">Privacy</a>
    <span th:unless="${adminId}">
      <a href="/login" th:href="@{/login}">Admin Login</a>
      <a href="/register" th:href="@{/register}">Register Restaurant</a>
    </span>
    <span th:if="${adminId}">
      <span th:text="'Welcome, ' + ${adminName}"></span>
      <a href="/admin-dashboard" th:href="@{/admin-dashboard}">Admin Dashboard</a>
      <a href="/logout" th:href="@{/logout}">Logout</a>
    </span>
  </nav>
</header>

<main>
  <div th:replace="${content}"></div>
</main>

<footer>
  &copy; 2026 Restaurant Reservation System. All rights reserved.
  <br>
  <a href="/privacy" th:href="@{/privacy}">Privacy Policy</a>
</footer>

</body>
</html>
