<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
  <meta charset="UTF-8">
  <title th:text="${pageTitle}">Restaurant Reservation System</title>
  <link rel="stylesheet" href="/css/main.css">
  <script type="module" src="/main.js"></script>
</head>
<body>

<header class="navbar">

  <div class="nav-left">
    <a class="logo" th:href="@{/}">
      <span class="logo-icon">🍽</span>
      <span class="logo-text">Yum Yum</span>
    </a>
  </div>

  <nav class="nav-center">

    <span th:if="${adminId == null}">
      <a th:href="@{/}">Choose your next feast</a>
    </span>

    <span th:if="${adminId}">
      <a th:href="@{/admin/admin-dashboard}">Dashboard</a>
      <a th:href="@{/admin/restaurants}">Restaurants</a>
      <a th:href="@{/admin/reservations}">Reservations</a>
    </span>
  </nav>

  <div class="nav-right">

    <span th:unless="${adminId}" class="auth-links">
      <a th:href="@{/login}" class="btn-outline">Admin Login</a>
      <a th:href="@{/register}" class="btn-primary">Register Restaurant</a>
    </span>

    <div th:if="${adminId}" class="admin-menu">
      <span class="admin-name" th:text="${adminName}"></span>
      <a th:href="@{/logout}" class="logout">Logout</a>
    </div>

  </div>

</header>

<main>
  <div th:replace="${content}"></div>
</main>

<footer>
  &copy; 2026 Restaurant Reservation System. All rights reserved.
  <br>
  <a href="/privacy" th:href="@{/privacy}">Privacy Policy</a>
</footer>

</body>
</html>
