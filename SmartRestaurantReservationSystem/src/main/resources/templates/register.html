<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="_layout::layout(~{::content})">
<head>
  <link rel="stylesheet" type="text/css" href="/css/auth.css">
</head>
<body>
<div th:fragment="content">
  <section class="form-section">
    <h2>Register Restaurant</h2>

    <div id="registerError" class="alert error"></div>
    <div id="registerSuccess" class="alert success"></div>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/login">Login here</a></p>
  </section>
  <script type="module" src="/js/services/register.js"></script>
</div>
</body>
</html>
