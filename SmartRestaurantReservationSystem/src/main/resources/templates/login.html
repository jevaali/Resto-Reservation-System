<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="_layout::layout(~{::content})">
<head>
  <link rel="stylesheet" type="text/css" href="/css/auth.css">
</head>
<body>
<div th:fragment="content">
  <section class="form-section">
    <h2>Admin Login</h2>

    <div id="loginError" class="alert error"></div>

    <div id="loginSuccess" class="alert success"></div>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="/register">Register here</a></p>
  </section>

  <script type="module" src="/js/services/login.js"></script>
</div>
</body>
</html>
