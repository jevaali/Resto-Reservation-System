<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="_layout::layout(~{::content})">
<body>
<div th:fragment="content">
  <section class="dashboard-section">
    <h2>Admin Dashboard</h2>
    <p id="welcomeMessage">Welcome to the admin dashboard. Here you can manage your restaurant's reservations and settings.</p>
    <div class="dashboard-grid">
      <div class="dashboard-card">
        <h3>Total Reservations</h3>
        <p id="totalReservations">0</p>
      </div>
      <div class="dashboard-card">
        <h3>Today's Reservations</h3>
        <p id="todayReservations">0</p>
      </div>
      <div class="dashboard-card">
        <h3>Available Tables</h3>
        <p id="availableTables">0</p>
      </div>
    </div>
  </section>
</div>
<script>
    // Get admin data from localStorage and display welcome message
    document.addEventListener('DOMContentLoaded', function() {
        const adminData = localStorage.getItem('admin');
        if (adminData) {
            try {
                const admin = JSON.parse(adminData);
                const welcomeMessage = document.getElementById('welcomeMessage');
                if (welcomeMessage && admin.name) {
                    welcomeMessage.textContent = `Welcome, ${admin.name}! Here you can manage your restaurant's reservations and settings.`;
                }
            } catch (parseError) {
                console.error('Error parsing admin data from localStorage:', parseError);
            }
        } else {
            console.warn('No admin data found in localStorage');
        }
    });
</script>
</body>
</html>
